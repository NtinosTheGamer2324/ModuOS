set timeout=5
set default=0

# 1. Set the resolution
set gfxmode=1024x768x32,800x600x32,auto
set gfxpayload=keep

# 2. Initialize graphics early
insmod all_video
insmod gfxterm
terminal_input console
terminal_output gfxterm

# 3. Load font
loadfont /ModuOS/shared/usr/assets/fonts/ProgrammerArtmon3.pf2

# Optional: colors
set menu_color_normal=yellow/black
set menu_color_highlight=white/blue

# Menu entry
menuentry "NTS/ModuOS" {
    insmod ext2
    insmod png
    insmod multiboot2
    
    # Force a graphics framebuffer payload for the kernel
    set gfxpayload=1024x768x32
    
    search --no-floppy --set=root --file /ModuOS/System64/mdsys.sqr
    multiboot2 /ModuOS/System64/mdsys.sqr
    boot
}